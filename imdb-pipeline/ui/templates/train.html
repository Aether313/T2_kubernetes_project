<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='externalstylesheet.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>


<body class="container mx-auto justify-content-center">
    <div class="contain">
        <h2>Upload CSV to Train Model</h2>
        <div class="row">
            <form action="/train" method="post" enctype="multipart/form-data" class="form-inline">
                <div class="form-group mb-3">
                    <label for="file" class="sr-only">CSV File</label>
                    <input type="file" name="file">
                </div>

                <button type="submit">Train Model</button>
            </form>
            {% if accuracy %}
            <p>{{ accuracy }}</p>
            {% endif %}
            <a href="/">Go to Predict Page</a>
        </div>
    </div>




</body>

</html>
