<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Predict</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='externalstylesheet.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="contain " >
        <h2>Predict IMDB Score</h2>
        <form action="/predict" method="post" >
            <div class="mb-3">
                <label for="Genre" class="form-label">Genre:</label>

                <input type="text" id="Genre" name="Genre" required>

            </div>
            <div class="mb-3">
                <label for="Runtime">Runtime (minutes): </label>
                <input type="number" name="Runtime (minutes)" id="Runtime" required>

            </div>
            <div class="mb-3">
                <label for="Language"> Language: </label>
                <input type="text" name="Language" id="Language" required>
            </div>
            <div class="mb-3">
                <label for="Director">Director: </label>
                <input type="text" name="Director" id="Director" required>

            </div>
            <div class="mb-3">
                <label for="Writer">Writer: </label>
                <input type="text" name="Writer" id="Writer">

            </div>
            <div class="mb-3">
                <label for="Production">Production House: </label>
                <input type="text" name="Production House" id="Production" required>
            </div>


            <button type="submit">Predict Me</button>
        </form>

        {% if prediction %}
        <h3>Prediction Result:</h3>
        <p>{{ prediction }}</p>
        {% endif %}

        <a href="/train_page">Go to Train Page</a>
    </div>
</body>

</html>
